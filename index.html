<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOurType - Typing Speed Test</title>
    <link rel="icon" href="./src/icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <div class="header-container">
            <img src="./src/logo.png" alt="YOurType Logo" class="logo">
            <h1>Typing Speed Test</h1>
        </div>
        <p id="paragraph"></p>
        <textarea name="" id="input" placeholder="Start typing here..."></textarea>

        <div class="stats">
            <p>Time: <span id="time">60</span> s</p>
            <p>WPM: <span id="wpm">0</span></p>
            <p>Accuracy: <span id="accuracy">0%</span></p>
        </div>

        <button id="restart">Restart</button>

        <div class="social-links">
            <a href="https://www.instagram.com/pradeeptiwarig" target="_blank" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.x.com/pradeeptiwarig" target="_blank" aria-label="X (Twitter)">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            <a href="https://www.facebook.com/pradeeptiwari82" target="_blank" aria-label="Facebook">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="https://www.linkedin.com/in/pradeep-tiwari82" target="_blank" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
